<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Progress</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

    <div class="progressColumn">
        <div id="progress"></div>

        <label class="progressCounter" id="progressCounter"></label>
    </div>
    

    <div class="controls">
        <label >
            <input type="number" id="valueInput" min="0" max="100" value="25">
            <span>Value</span>
        </label>

        <label class="switch">
            <input type="checkbox" id="animateToggle">
            <span class="slider"></span>
            <span class="label-text">Animate</span>
        </label>

        <label class="switch">
            <input type="checkbox" id="hideToggle">
            <span class="slider"></span>
            <span class="label-text">Hide</span>
        </label>

        <button class="loadResetBtn" id="loadResetBtn">Load</button>
    </div>
</div>

<script src="progress.js"></script>
</body>
</html>
